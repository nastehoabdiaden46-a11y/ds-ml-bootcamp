name: Submissions Report

on:
  push:
    branches: [main]
    paths:
      - "submissions/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate submission stats
        run: python scripts/submission_stats.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SUBMISSIONS.md
          if git diff --staged --quiet; then
            echo "No changes to SUBMISSIONS.md"
          else
            git commit -m "chore: update submission stats report"
            git push
          fi
